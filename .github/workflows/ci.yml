name: CI

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dewey_connect
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, pgsql, pdo_pgsql
          tools: composer

      - run: composer install

      - run: php bin/console doctrine:database:create --env=test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/dewey_connect?serverVersion=18&charset=utf8
      
      - run: php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/dewey_connect?serverVersion=18&charset=utf8
      
      - run: php bin/phpunit
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/dewey_connect?serverVersion=18&charset=utf8
